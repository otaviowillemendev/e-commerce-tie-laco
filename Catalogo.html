<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo · Tie Laços</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,600&family=Cormorant+Garamond:wght@500;600;700&family=DM+Serif+Display:ital@0;1&family=Quicksand:wght@500;600;700&family=Nunito:wght@400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/tie.css" />
<link rel="stylesheet" href="styles/catalog.css" />
</head>
<body data-active="catalogo">

<div id="tie-top"></div>

<main>
  <section class="pagehead" data-screen-label="Catálogo">
    <div class="wrap">
      <nav class="crumbs"><a href="Home.html">Início</a><span>/</span><b id="crumb-cat">Catálogo</b></nav>
      <h1 id="cat-title">Nossa coleção</h1>
      <p>Laços, tiaras, faixas e roupinhas — cada peça feita à mão, com amor.</p>
    </div>
  </section>

  <section class="catalog">
    <div class="wrap catalog__in">
      <!-- Filtros -->
      <aside class="filters" id="filters" aria-label="Filtros">
        <div class="filters__head">
          <h3>Filtros</h3>
          <button class="iconbtn js-filters-close" type="button" aria-label="Fechar filtros">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
          </button>
        </div>
        <div class="fgroup">
          <h4>Categoria</h4>
          <div id="f-cats"></div>
        </div>
        <div class="fgroup">
          <h4>Faixa de preço</h4>
          <div class="price-range">
            <input type="range" id="f-price" min="20" max="180" step="10" value="180" />
          </div>
          <div style="margin-top:.5rem">até <span class="frange-val" id="f-price-val">R$ 180,00</span></div>
        </div>
        <div class="fgroup">
          <h4>Cor</h4>
          <div class="fcolor" id="f-colors">
            <button type="button" data-col="#E0579A" style="background:#E0579A" aria-label="Rosa"></button>
            <button type="button" data-col="#C4167A" style="background:#C4167A" aria-label="Rosa escuro"></button>
            <button type="button" data-col="#7C2D6E" style="background:#7C2D6E" aria-label="Vinho"></button>
            <button type="button" data-col="#F8D7EA" style="background:#F8D7EA" aria-label="Rosa claro"></button>
            <button type="button" data-col="#FFFFFF" style="background:#FFFFFF" aria-label="Branco"></button>
          </div>
        </div>
        <div class="fgroup">
          <button class="fclear" type="button" id="f-clear">Limpar filtros</button>
        </div>
      </aside>

      <!-- Resultados -->
      <div class="catalog__main">
        <div class="cat-toolbar">
          <div class="cat-count"><b id="res-count">0</b> peças encontradas</div>
          <div class="cat-tools">
            <button class="filter-btn js-filters-open" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
              Filtros
            </button>
            <div class="sortsel">
              <select id="sort" aria-label="Ordenar">
                <option value="relev">Mais relevantes</option>
                <option value="price-asc">Menor preço</option>
                <option value="price-desc">Maior preço</option>
                <option value="rating">Melhor avaliados</option>
              </select>
            </div>
          </div>
        </div>
        <div class="active-chips" id="chips"></div>
        <div class="cat-grid" id="grid"></div>
      </div>
    </div>
  </section>
</main>

<div class="filters-scrim" id="filters-scrim"></div>
<div id="tie-bottom"></div>
<div id="tie-tweaks-root"></div>

<script src="scripts/products.js"></script>
<script src="scripts/chrome.js"></script>
<script src="scripts/tie.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="scripts/tie-tweaks.jsx"></script>

<script>
(function () {
  var P = window.TIE_PRODUCTS, CATS = window.TIE_CATS, brl = window.tieBRL;
  var state = { cats: [], maxPrice: 180, color: null, sort: 'relev' };

  // Pré-seleção por ?cat=
  var params = new URLSearchParams(location.search);
  var qcat = params.get('cat');
  var catMap = { lacos:'Laços', roupinhas:'Roupinhas', kits:'Kits', tiaras:'Tiaras', faixas:'Faixas' };
  if (qcat && catMap[qcat]) {
    state.cats = [catMap[qcat]];
    document.getElementById('cat-title').textContent = (CATS.find(function(c){return c.key===catMap[qcat];})||{}).label || 'Coleção';
    document.getElementById('crumb-cat').textContent = document.getElementById('cat-title').textContent;
  }

  // Render filtros de categoria
  var fcats = document.getElementById('f-cats');
  fcats.innerHTML = CATS.map(function (c) {
    var n = P.filter(function (p) { return p.cat === c.key; }).length;
    var on = state.cats.indexOf(c.key) > -1 ? 'checked' : '';
    return '<label class="fopt"><input type="checkbox" value="' + c.key + '" ' + on + '>' +
      '<span class="fbox"></span>' + c.label + '<span class="cnt">' + n + '</span></label>';
  }).join('');

  var grid = document.getElementById('grid');
  var chips = document.getElementById('chips');

  function apply() {
    var list = P.filter(function (p) {
      if (state.cats.length && state.cats.indexOf(p.cat) === -1) return false;
      if (p.price > state.maxPrice) return false;
      if (state.color && p.cols.indexOf(state.color) === -1) return false;
      return true;
    });
    if (state.sort === 'price-asc') list.sort(function (a, b) { return a.price - b.price; });
    if (state.sort === 'price-desc') list.sort(function (a, b) { return b.price - a.price; });
    if (state.sort === 'rating') list.sort(function (a, b) { return b.rating - a.rating; });

    document.getElementById('res-count').textContent = list.length;
    grid.innerHTML = list.length
      ? list.map(function (p) { return window.tieCard(p); }).join('')
      : '<div class="cat-empty"><p style="font-family:var(--font-head);font-size:1.4rem;color:var(--texto)">Nenhuma peça com esses filtros 🎀</p><p>Tente afrouxar os filtros.</p></div>';

    // chips ativos
    var c = [];
    state.cats.forEach(function (k) {
      var lbl = (CATS.find(function (x) { return x.key === k; }) || {}).label || k;
      c.push('<span class="chip">' + lbl + '<button type="button" data-rm-cat="' + k + '" aria-label="Remover">✕</button></span>');
    });
    if (state.maxPrice < 180) c.push('<span class="chip">até ' + brl(state.maxPrice) + '<button type="button" data-rm-price aria-label="Remover">✕</button></span>');
    if (state.color) c.push('<span class="chip">cor<button type="button" data-rm-color aria-label="Remover">✕</button></span>');
    chips.innerHTML = c.join('');
  }

  // Eventos categoria
  fcats.addEventListener('change', function (e) {
    var v = e.target.value;
    if (e.target.checked) { if (state.cats.indexOf(v) === -1) state.cats.push(v); }
    else state.cats = state.cats.filter(function (x) { return x !== v; });
    apply();
  });
  // Preço
  var price = document.getElementById('f-price');
  price.addEventListener('input', function () {
    state.maxPrice = +price.value;
    document.getElementById('f-price-val').textContent = brl(state.maxPrice);
    apply();
  });
  // Cor
  document.getElementById('f-colors').addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    var col = b.dataset.col;
    if (state.color === col) { state.color = null; b.classList.remove('on'); }
    else {
      state.color = col;
      this.querySelectorAll('button').forEach(function (x) { x.classList.remove('on'); });
      b.classList.add('on');
    }
    apply();
  });
  // Sort
  document.getElementById('sort').addEventListener('change', function () { state.sort = this.value; apply(); });
  // Clear
  document.getElementById('f-clear').addEventListener('click', function () {
    state.cats = []; state.maxPrice = 180; state.color = null;
    fcats.querySelectorAll('input').forEach(function (i) { i.checked = false; });
    price.value = 180; document.getElementById('f-price-val').textContent = brl(180);
    document.querySelectorAll('#f-colors button').forEach(function (x) { x.classList.remove('on'); });
    apply();
  });
  // Chips remover
  chips.addEventListener('click', function (e) {
    var t = e.target;
    if (t.dataset.rmCat) {
      state.cats = state.cats.filter(function (x) { return x !== t.dataset.rmCat; });
      var inp = fcats.querySelector('input[value="' + t.dataset.rmCat + '"]'); if (inp) inp.checked = false;
    }
    if (t.hasAttribute('data-rm-price')) { state.maxPrice = 180; price.value = 180; document.getElementById('f-price-val').textContent = brl(180); }
    if (t.hasAttribute('data-rm-color')) { state.color = null; document.querySelectorAll('#f-colors button').forEach(function (x) { x.classList.remove('on'); }); }
    apply();
  });

  // Drawer filtros (mobile)
  var filters = document.getElementById('filters');
  var scrim = document.getElementById('filters-scrim');
  function openF() { filters.classList.add('open'); scrim.classList.add('open'); document.body.style.overflow = 'hidden'; }
  function closeF() { filters.classList.remove('open'); scrim.classList.remove('open'); document.body.style.overflow = ''; }
  document.querySelector('.js-filters-open').addEventListener('click', openF);
  document.querySelector('.js-filters-close').addEventListener('click', closeF);
  scrim.addEventListener('click', closeF);

  apply();
})();
</script>

</body>
</html>
